name: Daily Forex Factory News

on:
  schedule:
    # Runs at 07:00 UTC every day. Adjust as needed.
    # Use https://crontab.guru to help with cron syntax
    - cron: '0 7 * * *' # Pas dit aan naar jouw gewenste tijd, bv. '0 5 * * 1-5' voor 05:00 UTC op weekdagen
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  screenshot_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Of '20', 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Run screenshot script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FOREX_FACTORY_USER: ${{ secrets.FOREX_FACTORY_USER }}
          FOREX_FACTORY_PASS: ${{ secrets.FOREX_FACTORY_PASS }}
        run: node screenshot.js

      # TIJDELIJKE DEBUG STAP (optioneel, maar nuttig als artefacten nog steeds niet verschijnen)
      # - name: List files in workspace 
      #   if: always() 
      #   run: |
      #     echo "Current directory: $(pwd)"
      #     echo "Listing files:"
      #     ls -la
      #     echo "Disk space:"
      #     df -h

      # Upload all potential screenshots as artifacts for debugging
      - name: Upload screenshot artifact
        if: always() # Run even if previous steps fail, for debugging
        uses: actions/upload-artifact@v4
        with:
          name: forex-screenshots # Name of the artifact bundle
          path: |
            forex_calendar.png
            debug_screenshot.png
            login_failed_debug.png
            error_screenshot.png
            filter_error_debug.png   # ***** NIEUW TOEGEVOEGD *****
          retention-days: 5 # Optional: keep artifacts for X days
          if-no-files-found: warn # Don't fail the workflow if one of these optional files isn't found
